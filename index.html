<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOUINE CHOP</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:sans-serif;
}

body{
    background:#0d0d0d;
    color:white;
    overflow-x:hidden;
}

header{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#111;
}

button{
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

#products{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:15px;
    padding:15px;
}

.card{
    background:#1a1a1a;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:10px;
}

.price{
    color:#00aaff;
    margin:5px 0;
}

#admin-panel{
    display:none;
    padding:15px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:5px;
    border:none;
}

#chat{
    position:fixed;
    bottom:0;
    right:0;
    width:100%;
    max-width:400px;
    background:#111;
}

#chat-box{
    height:200px;
    overflow:auto;
    padding:10px;
}

.msg{
    padding:8px;
    margin:5px;
    border-radius:5px;
}

.client{background:#333;}
.admin{background:#00aaff;}

footer{
    text-align:center;
    padding:10px;
    background:#111;
    margin-top:20px;
}
</style>
</head>

<body>

<header>
    <h2>ZOUINE CHOP</h2>
    <button onclick="openLogin()">⚙️</button>
</header>

<!-- ADMIN -->
<div id="admin-panel">
    <h3>إضافة منتج</h3>
    <input id="n" placeholder="اسم المنتج">
    <input type="file" id="i" accept="image/*">
    <input id="p" placeholder="الثمن">
    <button onclick="addProduct()">إضافة</button>
</div>

<!-- PRODUCTS -->
<div id="products"></div>

<!-- CHAT -->
<div id="chat">
    <div id="chat-box"></div>
    <input id="msg" placeholder="كتب رسالة...">
    <button onclick="sendMsg()">إرسال</button>
</div>

<footer>
<p>ZOUINE CHOP © 2026</p>
</footer>

<script>

// DATABASE
let products = JSON.parse(localStorage.getItem('db')) || [];
let messages = JSON.parse(localStorage.getItem('msgs')) || [];

// LOGIN
function openLogin(){
    let pass = prompt("كلمة السر:");

    if(pass === "123"){
        localStorage.setItem("role","admin");
        document.getElementById('admin-panel').style.display="block";
    }

    else if(pass === "12345"){
        localStorage.setItem("role","chat");
        alert("تم الدخول للشات");
    }
}

// AUTO LOGIN
if(localStorage.getItem("role")==="admin"){
    document.getElementById('admin-panel').style.display="block";
}

// ADD PRODUCT WITH IMAGE UPLOAD
function addProduct(){
    let n = document.getElementById('n').value;
    let file = document.getElementById('i').files[0];
    let p = document.getElementById('p').value;

    if(n && p){
        if(file){
            let reader = new FileReader();

            reader.onload = function(e){
                products.push({
                    n:n,
                    i:e.target.result,
                    p:p
                });

                localStorage.setItem('db',JSON.stringify(products));
                renderProducts();
            }

            reader.readAsDataURL(file);

        } else {
            products.push({
                n:n,
                i:"",
                p:p
            });

            localStorage.setItem('db',JSON.stringify(products));
            renderProducts();
        }
    }
}

// RENDER PRODUCTS
function renderProducts(){
    let div = document.getElementById('products');

    div.innerHTML = products.map((e)=>`
        <div class="card">
            <img src="${e.i || 'https://via.placeholder.com/150'}">
            <h4>${e.n}</h4>
            <div class="price">${e.p} درهم</div>
        </div>
    `).join('');
}

// CHAT
function sendMsg(){
    let msg = document.getElementById('msg').value;
    if(!msg) return;

    let role = localStorage.getItem("role") || "client";

    messages.push({
        text:msg,
        from: role==="admin" ? "admin":"client"
    });

    localStorage.setItem('msgs',JSON.stringify(messages));
    document.getElementById('msg').value="";
    renderMsgs();
}

function renderMsgs(){
    let box = document.getElementById('chat-box');

    box.innerHTML = messages.map(m=>`
        <div class="msg ${m.from}">
            ${m.text}
        </div>
    `).join('');
}

// INIT
renderProducts();
renderMsgs();

</script>

</body>
</html>
