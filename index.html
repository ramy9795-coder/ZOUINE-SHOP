<div id="toast"></div>

<script>
'use strict';
/*═══════════════════════════════════════
  CONFIG
═══════════════════════════════════════*/
const API = (location.protocol === 'file:')
  ? 'https://REPLACE_WITH_YOUR_DOMAIN/api'
  : '/api';

const ADMIN_CODE   = '197803';
const MAX_ORDERS   = 2;          // per 24h per user
const ORDER_WINDOW = 24*60*60*1000;

/*═══════════════════════════════════════
  STATE
═══════════════════════════════════════*/
let ME = null;  // current logged-in user (stored in localStorage only)

try { ME = JSON.parse(localStorage.getItem('kg_me')); } catch{}

/*═══════════════════════════════════════
  API HELPERS
═══════════════════════════════════════*/
async function apiFetch(path, opts={}) {
  try {
    const r = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json', ...opts.headers },
      ...opts,
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    if (r.status === 204) return null;
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || r.status);
    return data;
  } catch(e) {
    throw e;
  }
}

const api = {
  games:   { list: ()=>apiFetch('/games'), create: b=>apiFetch('/games',{method:'POST',body:b}),
              update: (id,b)=>apiFetch(`/games/${id}`,{method:'PATCH',body:b}),
              del: id=>apiFetch(`/games/${id}`,{method:'DELETE'}) },
  users:   { list: ()=>apiFetch('/users'), login: b=>apiFetch('/users/login',{method:'POST',body:b}),
              register: b=>apiFetch('/users/register',{method:'POST',body:b}),
              del: id=>apiFetch(`/users/${id}`,{method:'DELETE'}) },
  orders:  { list: ()=>apiFetch('/orders'), create: b=>apiFetch('/orders',{method:'POST',body:b}),
              del: id=>apiFetch(`/orders/${id}`,{method:'DELETE'}) },
};

/*═══════════════════════════════════════
  UTILITIES
═══════════════════════════════════════*/
const toAr = n => String(n).replace(/\d/g, d=>'٠١٢٣٤٥٦٧٨٩'[d]);

const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const fmtDate = iso => {
  try{const d=new Date(iso);return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');}catch{return '—';}
};

// Letters only (Arabic or Latin), 3-8 chars, no digits
const validName  = n => /^[\u0600-\u06FFa-zA-ZÀ-ÿ\s]{3,8}$/.test(n.trim());
// Exactly 8 digits (the "06" prefix is added separately)
const validPhone8 = p => /^\d{8}$/.test(p.trim());
// Build full phone from 8-digit suffix
const fullPhone  = p => '06' + p.trim();

/*═══════════════════════════════════════
  TOAST
═══════════════════════════════════════*/
let _toastT;
function toast(msg, isErr=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = isErr ? 'show err' : 'show';
  clearTimeout(_toastT);
  _toastT = setTimeout(()=>{ el.className=''; },3800);
}

/*═══════════════════════════════════════
  MODALS
═══════════════════════════════════════*/
function openM(id)  { document.getElementById(id).classList.add('open'); }
function closeM(id) { document.getElementById(id).classList.remove('open'); }

/*═══════════════════════════════════════
  PAGE ROUTING
═══════════════════════════════════════*/
function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+id).classList.add('active');
  document.getElementById('fn-home-btn').style.display = id==='admin' ? 'flex' : 'none';
  window.scrollTo(0,0);
}
function goHome() { showPage('home'); renderHome(); }

/*═══════════════════════════════════════
  LONG-PRESS ADMIN
═══════════════════════════════════════*/
let _lpT;
const logoEl = document.getElementById('logo-lp');

function lpStart(){
  logoEl.classList.add('pressing');
  _lpT = setTimeout(()=>{
    logoEl.classList.remove('pressing');
    document.getElementById('code-inp').value='';
    document.getElementById('code-err').classList.remove('show');
    openM('m-code');
    setTimeout(()=>document.getElementById('code-inp').focus(),200);
  },5000);
}
function lpEnd(){ clearTimeout(_lpT); logoEl.classList.remove('pressing'); }

logoEl.addEventListener('mousedown', lpStart);
logoEl.addEventListener('mouseup',   lpEnd);
logoEl.addEventListener('mouseleave',lpEnd);
logoEl.addEventListener('touchstart',e=>{e.preventDefault();lpStart();},{passive:false});
logoEl.addEventListener('touchend',  lpEnd);
logoEl.addEventListener('touchcancel',lpEnd);

function checkCode(){
  if(document.getElementById('code-inp').value.trim()===ADMIN_CODE){
    closeM('m-code');
    openAdmin();
  } else {
    document.getElementById('code-err').classList.add('show');
  }
}

async function openAdmin(){
  showPage('admin');
  switchTab('orders');
  renderAdmin();
}

/*═══════════════════════════════════════
  ADMIN TABS
═══════════════════════════════════════*/
function switchTab(name){
  const names=['orders','users','games'];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',names[i]===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

/*═══════════════════════════════════════
  LOGIN STEP CONTROL
═══════════════════════════════════════*/
function showLS(step){
  ['choose','login','register'].forEach(s=>{
    document.getElementById('ls-'+s).style.display = s===step?'':'none';
  });
}

/*═══════════════════════════════════════
  HEADER USER AREA
═══════════════════════════════════════*/
function renderHeader(){
  const el = document.getElementById('header-user');
  if(ME){
    el.innerHTML = `<div class="user-pill">
      <span>مرحباً، <strong>${esc(ME.name)}</strong></span>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">خروج</button>
    </div>`;
  } else {
    el.innerHTML = `<button class="btn btn-outline btn-sm" onclick="showLS('choose');openM('m-login')">تسجيل الدخول</button>`;
  }
}

function doLogout(){
  ME=null; localStorage.removeItem('kg_me');
  renderHeader();
  showLS('choose');
  openM('m-login');
}

/*═══════════════════════════════════════
  LOGIN
═══════════════════════════════════════*/
async function doLogin(){
  const suffix = document.getElementById('li-phone').value.trim();
  const errEl  = document.getElementById('li-phone-e');
  errEl.classList.remove('show');

  if(!validPhone8(suffix)){
    errEl.textContent='⚠ أدخل 8 أرقام بعد 06';
    errEl.classList.add('show'); return;
  }

  const phone = fullPhone(suffix);
  const btn=document.getElementById('li-btn');
  btn.disabled=true; btn.textContent='جاري التحقق...';

  try {
    const user = await api.users.login({phone});
    setMe(user);
    closeM('m-login');
    toast('مرحباً بعودتك '+user.name+' !');
    renderHome();
  } catch(e){
    errEl.textContent='⚠ رقم الهاتف غير موجود. أنشئ حساباً جديداً.';
    errEl.classList.add('show');
  } finally { btn.disabled=false; btn.textContent='دخول'; }
}

/*═══════════════════════════════════════
  REGISTER
═══════════════════════════════════════*/
async function doRegister(){
  const name   = document.getElementById('ri-name').value.trim();
  const suffix = document.getElementById('ri-phone').value.trim();
  const nErr   = document.getElementById('ri-name-e');
  const pErr   = document.getElementById('ri-phone-e');
  const dErr   = document.getElementById('ri-phone-dup');
  [nErr,pErr,dErr].forEach(e=>e.classList.remove('show'));

  let ok=true;
  if(!validName(name))    { nErr.classList.add('show'); ok=false; }
  if(!validPhone8(suffix)){ pErr.classList.add('show'); ok=false; }
  if(!ok) return;

  const phone = fullPhone(suffix);

  const btn=document.getElementById('ri-btn');
  btn.disabled=true; btn.textContent='جاري التسجيل...';

  try {
    // Check for duplicate phone BEFORE registering
    const users = await api.users.list();
    if(users.some(u=>u.phone===phone)){
      dErr.classList.add('show');
      btn.disabled=false; btn.textContent='إنشاء الحساب';
      return;
    }

    const user = await api.users.register({name,phone});
    setMe(user);
    closeM('m-login');
    toast('مرحباً بك '+user.name+' !');
    renderHome();
  } catch(e){
    toast('حدث خطأ أثناء التسجيل',true);
  } finally { btn.disabled=false; btn.textContent='إنشاء الحساب'; }
}

function setMe(user){
  ME=user;
  localStorage.setItem('kg_me',JSON.stringify(user));
  renderHeader();
}

/*═══════════════════════════════════════
  HOME RENDER
═══════════════════════════════════════*/
async function renderHome(){
  renderHeader();
  const grid=document.getElementById('games-grid');
  grid.innerHTML='<div class="loader"><div class="spin"></div></div>';

  try {
    const games = await api.games.list();
    if(!games.length){
      grid.innerHTML='<div class="empty-state"><div class="ei">🎮</div><p>لا توجد ألعاب حالياً</p></div>';
      return;
    }
    grid.innerHTML=games.map((g,i)=>`
      <div class="game-card" style="animation-delay:${i*.07}s" onclick="tryOrder(${g.id})">
        <div class="img-box">
          ${g.imageUrl
            ?`<img src="${esc(g.imageUrl)}" alt="${esc(g.title)}" loading="lazy"/>`
            :`<div class="img-ph">K</div>`}
          <div class="grad"></div>
        </div>
        <div class="card-info">
          <div class="card-title">${esc(g.title)}</div>
          <div class="card-foot">
            <div class="card-price">${toAr(g.price)} درهم</div>
            <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();tryOrder(${g.id})">🛒 اطلب</button>
          </div>
        </div>
      </div>`).join('');
    _gamesCache = games;
  } catch(e){
    grid.innerHTML='<div class="empty-state"><div class="ei">⚠️</div><p>تعذر تحميل الألعاب</p></div>';
  }
}

let _gamesCache=[];
let _pendingGameId=null;

/*═══════════════════════════════════════
  ORDER FLOW
═══════════════════════════════════════*/
async function tryOrder(gameId){
  if(!ME){ showLS('choose'); openM('m-login'); _pendingGameId=gameId; return; }
  _pendingGameId=gameId;

  const g=_gamesCache.find(x=>x.id===gameId);
  if(!g) return;

  document.getElementById('ord-gname').textContent  = g.title;
  document.getElementById('ord-gprice').textContent = toAr(g.price)+' درهم';
  document.getElementById('ord-uname').textContent  = ME.name;
  document.getElementById('ord-uphone').textContent = ME.phone;

  // Check daily order limit
  const limited = await checkOrderLimit(ME.phone);
  document.getElementById('ord-limit-warning').style.display = limited ? 'block' : 'none';
  document.getElementById('ord-confirm-btn').disabled = limited;

  openM('m-order');
}

async function checkOrderLimit(phone){
  try {
    const orders = await api.orders.list();
    const now = Date.now();
    const recent = orders.filter(o=>o.phone===phone && (now-new Date(o.createdAt).getTime()) < ORDER_WINDOW);
    return recent.length >= MAX_ORDERS;
  } catch { return false; }
}

async function confirmOrder(){
  if(!ME||!_pendingGameId) return;
  const g=_gamesCache.find(x=>x.id===_pendingGameId);
  if(!g) return;

  const btn=document.getElementById('ord-confirm-btn');
  btn.disabled=true; btn.textContent='جاري الإرسال...';

  try {
    await api.orders.create({ name:ME.name, phone:ME.phone, gameTitle:g.title, gameId:g.id, price:g.price });
    _pendingGameId=null;
    closeM('m-order');
    toast('✅ تم إرسال طلبك! سنتواصل معك قريباً.');
  } catch(e){
    toast('حدث خطأ أثناء إرسال الطلب',true);
    btn.disabled=false; btn.textContent='✅ تأكيد الطلب';
  }
}

/*═══════════════════════════════════════
  ADMIN RENDER
═══════════════════════════════════════*/
async function renderAdmin(){
  renderAdminOrders();
  renderAdminUsers();
  renderAdminGames();
}

async function renderAdminOrders(){
  const el=document.getElementById('tbody-orders');
  const cnt=document.getElementById('orders-count');
  el.innerHTML='<tr><td class="empty-td" colspan="7">جاري التحميل...</td></tr>';
  try {
    const orders=await api.orders.list();
    cnt.textContent=orders.length+' طلب';
    if(!orders.length){ el.innerHTML='<tr><td class="empty-td" colspan="7">لا توجد طلبات بعد</td></tr>'; return; }
    el.innerHTML=orders.map(o=>`
      <tr>
        <td data-lbl="#" class="td-muted">${o.id}</td>
        <td data-lbl="الاسم"><strong>${esc(o.name)}</strong></td>
        <td data-lbl="الهاتف" class="td-phone">${esc(o.phone)}</td>
        <td data-lbl="اللعبة">${esc(o.gameTitle)}</td>
        <td data-lbl="السعر" class="td-price">${toAr(o.price)} درهم</td>
        <td data-lbl="التاريخ" class="td-muted">${fmtDate(o.createdAt)}</td>
        <td class="td-actions"><button class="btn btn-danger btn-sm" onclick="delOrder(${o.id})">حذف</button></td>
      </tr>`).join('');
  } catch{ el.innerHTML='<tr><td class="empty-td" colspan="7">تعذر التحميل</td></tr>'; }
}

async function renderAdminUsers(){
  const el=document.getElementById('tbody-users');
  const cnt=document.getElementById('users-count');
  el.innerHTML='<tr><td class="empty-td" colspan="5">جاري التحميل...</td></tr>';
  try {
    const users=await api.users.list();
    cnt.textContent=users.length+' مستخدم';
    if(!users.length){ el.innerHTML='<tr><td class="empty-td" colspan="5">لا يوجد مستخدمون</td></tr>'; return; }
    el.innerHTML=users.map(u=>`
      <tr>
        <td data-lbl="#" class="td-muted">${u.id}</td>
        <td data-lbl="الاسم"><strong>${esc(u.name)}</strong></td>
        <td data-lbl="الهاتف" class="td-phone">${esc(u.phone)}</td>
        <td data-lbl="التسجيل" class="td-muted">${fmtDate(u.createdAt)}</td>
        <td class="td-actions"><button class="btn btn-danger btn-sm" onclick="delUser(${u.id})">حذف</button></td>
      </tr>`).join('');
  } catch{ el.innerHTML='<tr><td class="empty-td" colspan="5">تعذر التحميل</td></tr>'; }
}

async function renderAdminGames(){
  const el=document.getElementById('tbody-games');
  el.innerHTML='<tr><td class="empty-td" colspan="5">جاري التحميل...</td></tr>';
  try {
    const games=await api.games.list();
    _gamesCache=games;
    if(!games.length){ el.innerHTML='<tr><td class="empty-td" colspan="5">لا توجد ألعاب</td></tr>'; return; }
    el.innerHTML=games.map(g=>`
      <tr>
        <td class="td-img" data-lbl="الصورة">
          ${g.imageUrl
            ?`<img src="${esc(g.imageUrl)}" alt="${esc(g.title)}"/>`
            :`<div class="no-img">لا صورة</div>`}
        </td>
        <td data-lbl="العنوان"><strong>${esc(g.title)}</strong></td>
        <td data-lbl="السعر" class="td-price">${toAr(g.price)} درهم</td>
        <td data-lbl="التصنيف" class="td-muted">${esc(g.category||'—')}</td>
        <td class="td-actions">
          <button class="btn btn-ghost btn-sm" onclick="openGameForm(${g.id})">تعديل</button>
          <button class="btn btn-danger btn-sm" onclick="delGame(${g.id})">حذف</button>
        </td>
      </tr>`).join('');
  } catch{ el.innerHTML='<tr><td class="empty-td" colspan="5">تعذر التحميل</td></tr>'; }
}

/*═══════════════════════════════════════
  DELETE HANDLERS
═══════════════════════════════════════*/
async function delOrder(id){
  if(!confirm('حذف هذا الطلب؟')) return;
  try{ await api.orders.del(id); renderAdminOrders(); toast('تم حذف الطلب'); }
  catch{ toast('خطأ أثناء الحذف',true); }
}
async function delUser(id){
  if(!confirm('حذف هذا المستخدم؟')) return;
  try{ await api.users.del(id); renderAdminUsers(); toast('تم حذف المستخدم'); }
  catch{ toast('خطأ أثناء الحذف',true); }
}
async function delGame(id){
  if(!confirm('حذف هذه اللعبة؟')) return;
  try{ await api.games.del(id); renderAdminGames(); renderHome(); toast('تم حذف اللعبة'); }
  catch{ toast('خطأ أثناء الحذف',true); }
}

/*═══════════════════════════════════════
  GAME FORM
═══════════════════════════════════════*/
let _editId=null, _imgData='';

async function openGameForm(gameId=null){
  _editId=gameId; _imgData='';
  resetImgPrev();
  ['gf-title-e','gf-price-e'].forEach(id=>document.getElementById(id).classList.remove('show'));

  if(gameId){
    const g=_gamesCache.find(x=>x.id===gameId);
    document.getElementById('gf-title-h').textContent='تعديل اللعبة';
    document.getElementById('gf-title').value=g.title;
    document.getElementById('gf-price').value=g.price;
    document.getElementById('gf-cat').value=g.category||'';
    document.getElementById('gf-url').value=(g.imageUrl&&!g.imageUrl.startsWith('data:'))?g.imageUrl:'';
    if(g.imageUrl){ _imgData=g.imageUrl; showImgPrev(g.imageUrl); }
  } else {
    document.getElementById('gf-title-h').textContent='إضافة لعبة جديدة';
    ['gf-title','gf-price','gf-cat','gf-url'].forEach(id=>document.getElementById(id).value='');
  }
  openM('m-game');
}

function closeGameForm(){ closeM('m-game'); _editId=null; _imgData=''; resetImgPrev(); }

function onFileChange(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{ _imgData=ev.target.result; showImgPrev(_imgData); document.getElementById('gf-url').value=''; };
  r.readAsDataURL(f);
}
function onUrlChange(v){ if(v.trim()){ _imgData=v.trim(); showImgPrev(v.trim()); } else { resetImgPrev(); } }
function showImgPrev(src){ document.getElementById('img-ph').style.display='none'; const i=document.getElementById('img-prev'); i.src=src; i.style.display='block'; }
function resetImgPrev(){ document.getElementById('img-ph').style.display=''; const i=document.getElementById('img-prev'); i.style.display='none'; i.src=''; document.getElementById('gf-file').value=''; }

async function saveGame(){
  const title=document.getElementById('gf-title').value.trim();
  const price=parseFloat(document.getElementById('gf-price').value);
  let ok=true;
  if(!title){ document.getElementById('gf-title-e').classList.add('show'); ok=false; } else { document.getElementById('gf-title-e').classList.remove('show'); }
  if(isNaN(price)||price<0){ document.getElementById('gf-price-e').classList.add('show'); ok=false; } else { document.getElementById('gf-price-e').classList.remove('show'); }
  if(!ok) return;

  const payload={
    title, price, category:document.getElementById('gf-cat').value.trim()||undefined,
    imageUrl:_imgData||document.getElementById('gf-url').value.trim()||undefined,
  };

  const btn=document.querySelector('#m-game .btn-primary');
  btn.disabled=true; btn.textContent='جاري الحفظ...';

  try{
    if(_editId){ await api.games.update(_editId,payload); toast('تم تعديل اللعبة بنجاح'); }
    else        { await api.games.create(payload);         toast('تمت إضافة اللعبة بنجاح'); }
    closeGameForm();
    renderAdminGames();
    renderHome();
  } catch{ toast('خطأ أثناء الحفظ',true); }
  finally{ btn.disabled=false; btn.textContent='💾 حفظ اللعبة'; }
}

  if(!ME){ showLS('choose'); openM('m-login'); }
