<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOUINE CHOP</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0d0d0d;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#111;
}

#cart-btn{
    background:#00aaff;
    color:white;
}

#products{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
    padding:15px;
}

.card{
    background:#1a1a1a;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.info{
    padding:10px;
}

.price{
    color:#00aaff;
    margin:5px 0;
}

button{
    width:100%;
    padding:8px;
    border:none;
    border-radius:6px;
    background:#00aaff;
    color:white;
    cursor:pointer;
}

#admin{
    display:none;
    padding:15px;
}

#cart{
    position:fixed;
    top:0;
    right:0;
    width:300px;
    height:100%;
    background:#111;
    padding:10px;
    display:none;
}

.cart-item{
    margin:10px 0;
    border-bottom:1px solid #333;
    padding-bottom:5px;
}

input{
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:5px;
    border:none;
}
</style>
</head>

<body>

<header>
<h2>ZOUINE CHOP</h2>
<button onclick="toggleCart()" id="cart-btn">🛒 (<span id="count">0</span>)</button>
</header>

<!-- ADMIN -->
<div id="admin">
<h3>إضافة منتج</h3>
<input id="n" placeholder="اسم المنتج">
<input type="file" id="i" accept="image/*">
<input id="p" placeholder="الثمن">
<button onclick="addProduct()">إضافة</button>
</div>

<!-- PRODUCTS -->
<div id="products"></div>

<!-- CART -->
<div id="cart">
<h3>السلة</h3>
<div id="cart-items"></div>
<h4>المجموع: <span id="total">0</span> درهم</h4>
<button onclick="sendOrder()">إرسال الطلب</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem('db')) || [];
let cart = JSON.parse(localStorage.getItem('cart')) || [];

// LOGIN
document.body.ondblclick = function(){
    let pass = prompt("كلمة السر:");
    if(pass === "123"){
        document.getElementById('admin').style.display="block";
    }
}

// ADD PRODUCT WITH IMAGE
function addProduct(){
    let n = document.getElementById('n').value;
    let file = document.getElementById('i').files[0];
    let p = document.getElementById('p').value;

    if(n && p){
        let reader = new FileReader();

        reader.onload = function(e){
            products.push({
                n:n,
                i:e.target.result,
                p:p
            });

            localStorage.setItem('db', JSON.stringify(products));
            renderProducts();
        }

        if(file) reader.readAsDataURL(file);
    }
}

// SHOW PRODUCTS
function renderProducts(){
    let div = document.getElementById('products');

    div.innerHTML = products.map((e,idx)=>`
        <div class="card">
            <img src="${e.i}">
            <div class="info">
                <h4>${e.n}</h4>
                <div class="price">${e.p} درهم</div>
                <button onclick="addToCart(${idx})">أضف للسلة</button>
            </div>
        </div>
    `).join('');
}

// CART
function addToCart(i){
    cart.push(products[i]);
    localStorage.setItem('cart', JSON.stringify(cart));
    document.getElementById('count').innerText = cart.length;
}

function toggleCart(){
    let c = document.getElementById('cart');
    c.style.display = c.style.display==="block" ? "none":"block";
    renderCart();
}

function renderCart(){
    let div = document.getElementById('cart-items');
    let total = 0;

    div.innerHTML = cart.map((e)=>{
        total += parseInt(e.p);
        return `<div class="cart-item">${e.n} - ${e.p} درهم</div>`;
    }).join('');

    document.getElementById('total').innerText = total;
}

// SEND ORDER (MESSAGE)
function sendOrder(){
    if(cart.length === 0){
        alert("السلة فارغة!");
        return;
    }

    let msg = "طلب جديد:\n";

    cart.forEach(e=>{
        msg += `- ${e.n} (${e.p} درهم)\n`;
    });

    msg += "المجموع: " + document.getElementById('total').innerText + " درهم";

    alert(msg); // هنا كيبان message
}

// INIT
renderProducts();
document.getElementById('count').innerText = cart.length;

</script>

</body>
</html>
