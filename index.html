<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZOUINE CHOP</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:#f5f7fb;
    color:#222;
}

/* HEADER */
header{
    background:#0a2540;
    color:white;
    text-align:center;
    padding:15px;
    font-size:20px;
}

/* PRODUCTS */
#products{
    padding:10px;
    display:grid;
    grid-template-columns:1fr;
    gap:15px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.info{
    padding:10px;
}

.price{
    color:#0077ff;
    font-weight:bold;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#0077ff;
    color:white;
    margin-top:5px;
}

/* CART */
#cart-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#0077ff;
    padding:12px;
    border-radius:50%;
}

#cart{
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    display:none;
    padding:15px;
    border-radius:20px 20px 0 0;
}

/* CHAT */
#chat{
    position:fixed;
    top:0;
    right:0;
    width:100%;
    max-width:400px;
    height:100%;
    background:white;
    display:none;
}

#chat-box{
    height:80%;
    overflow:auto;
    padding:10px;
}

.msg{
    margin:5px;
    padding:8px;
    border-radius:10px;
}

.client{background:#e5e5e5;}
.admin{background:#0077ff;color:white;}

input{
    width:100%;
    padding:10px;
    border:none;
    border-top:1px solid #ccc;
}

</style>
</head>

<body>

<header>ZOUINE CHOP</header>

<div id="products"></div>

<button id="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></button>

<div id="cart">
<h3>السلة</h3>
<div id="cart-items"></div>
<h4>المجموع: <span id="total">0</span> درهم</h4>
<button onclick="sendOrder()">إرسال الطلب</button>
<button onclick="openChat()">💬 تواصل</button>
</div>

<!-- CHAT -->
<div id="chat">
<div id="chat-box"></div>
<input id="msg" placeholder="كتب رسالة..." onkeypress="if(event.key==='Enter') sendMsg()">
</div>

<script>

let products = JSON.parse(localStorage.getItem('db')) || [];
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let messages = JSON.parse(localStorage.getItem('msgs')) || [];

/* PRODUCTS */
function renderProducts(){
    let div = document.getElementById('products');

    div.innerHTML = products.map((p,i)=>`
        <div class="card">
            <img src="${p.i}">
            <div class="info">
                <h3>${p.n}</h3>
                <div class="price">${p.p} درهم</div>
                <button onclick="addToCart(${i})">أضف للسلة</button>
            </div>
        </div>
    `).join('');
}

/* CART */
function addToCart(i){
    cart.push(products[i]);
    localStorage.setItem('cart',JSON.stringify(cart));
    document.getElementById('count').innerText = cart.length;
}

function toggleCart(){
    let c = document.getElementById('cart');
    c.style.display = c.style.display==="block"?"none":"block";
    renderCart();
}

function renderCart(){
    let div = document.getElementById('cart-items');
    let total = 0;

    div.innerHTML = cart.map(p=>{
        total += parseInt(p.p);
        return `<div>${p.n} - ${p.p}</div>`;
    }).join('');

    document.getElementById('total').innerText = total;
}

/* ORDER */
function sendOrder(){
    let msg = "طلب:\n";
    cart.forEach(p=>{
        msg += `- ${p.n} (${p.p})\n`;
    });

    messages.push({from:"client",text:msg});
    localStorage.setItem('msgs',JSON.stringify(messages));

    alert("تم إرسال الطلب");
}

/* CHAT */
function openChat(){
    document.getElementById('chat').style.display="block";
    renderMsgs();
}

function sendMsg(){
    let txt = document.getElementById('msg').value;
    if(!txt) return;

    messages.push({from:"client",text:txt});
    localStorage.setItem('msgs',JSON.stringify(messages));

    document.getElementById('msg').value="";
    renderMsgs();
}

function renderMsgs(){
    let box = document.getElementById('chat-box');

    box.innerHTML = messages.map(m=>`
        <div class="msg ${m.from}">${m.text}</div>
    `).join('');
}

/* INIT */
renderProducts();
document.getElementById('count').innerText = cart.length;

</script>

</body>
</html>
