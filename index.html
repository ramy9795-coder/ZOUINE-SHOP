<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZOUINE CHOP</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Cairo', sans-serif;
    background:#111;
    color:#eee;
}

/* HEADER */
header{
    text-align:center;
    padding:15px;
    font-size:20px;
    font-weight:bold;
}

/* GRID */
#products-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:15px;
    padding:10px;
}

/* CARD */
.card{
    background:#1c1c1c;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

/* IMAGE */
.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

/* INFO */
.info{
    padding:10px;
}

.info h3{
    margin:5px 0;
}

.price{
    color:#00d4aa;
    font-size:18px;
    margin:5px 0;
}

/* BUTTON */
button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#2a2a2a;
    color:white;
    font-size:15px;
}

/* CART BUTTON */
#cart-btn{
    position:fixed;
    bottom:15px;
    right:15px;
    background:#00d4aa;
    padding:12px;
    border-radius:50px;
}

/* CART */
#cart-modal{
    display:none;
    position:fixed;
    bottom:0;
    width:100%;
    background:#1a1a1a;
    border-top-left-radius:20px;
    border-top-right-radius:20px;
    padding:15px;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
    border-bottom:1px solid #333;
}

/* ADMIN */
#admin-panel{
    display:none;
    padding:10px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    border:none;
    background:#2a2a2a;
    color:white;
}

footer{
    text-align:center;
    margin:20px 0;
    color:#777;
}

</style>
</head>

<body>

<header>ZOUINE CHOP</header>

<!-- ADMIN -->
<div id="admin-panel">
    <input id="n" placeholder="اسم المنتج">
    <input type="file" id="i" accept="image/*">
    <input id="p" placeholder="الثمن">
    <button onclick="addProduct()">إضافة المنتج</button>
</div>

<!-- PRODUCTS -->
<div id="products-grid"></div>

<!-- CART BTN -->
<button id="cart-btn" onclick="toggleCart()">🛒 (<span id="count">0</span>)</button>

<!-- CART -->
<div id="cart-modal">
    <h3>السلة</h3>
    <div id="cart-items"></div>
    <h4>المجموع: <span id="total">0</span> درهم</h4>
    <button onclick="sendOrder()">إرسال الطلب</button>
</div>

<footer id="admin-trigger">ZOUINE CHOP © 2026</footer>

<script>

let products = JSON.parse(localStorage.getItem('db')) || [];
let cart = JSON.parse(localStorage.getItem('cart')) || [];

// LOGIN ADMIN
document.getElementById('admin-trigger').onclick = function(){
    let pass = prompt("كلمة السر:");
    if(pass === "123"){
        localStorage.setItem("admin","yes");
        document.getElementById('admin-panel').style.display="block";
    }
}

// AUTO LOGIN
if(localStorage.getItem("admin")==="yes"){
    document.getElementById('admin-panel').style.display="block";
}

// ADD PRODUCT
function addProduct(){
    let n = document.getElementById('n').value;
    let file = document.getElementById('i').files[0];
    let p = document.getElementById('p').value;

    if(n && p){
        let reader = new FileReader();
        reader.onload = function(e){
            products.push({n,i:e.target.result,p});
            localStorage.setItem('db',JSON.stringify(products));
            renderProducts();
        }
        if(file) reader.readAsDataURL(file);
    }
}

// SHOW PRODUCTS
function renderProducts(){
    let div = document.getElementById('products-grid');

    div.innerHTML = products.map((e,idx)=>`
        <div class="card">
            <img src="${e.i}">
            <div class="info">
                <h3>${e.n}</h3>
                <div class="price">${e.p} درهم</div>
                <button onclick="addToCart(${idx})">أضف للسلة</button>
            </div>
        </div>
    `).join('');
}

// CART
function addToCart(i){
    cart.push(products[i]);
    localStorage.setItem('cart',JSON.stringify(cart));
    document.getElementById('count').innerText = cart.length;
}

// TOGGLE CART
function toggleCart(){
    let c = document.getElementById('cart-modal');
    c.style.display = c.style.display==="block" ? "none":"block";
    renderCart();
}

// RENDER CART
function renderCart(){
    let div = document.getElementById('cart-items');
    let total = 0;

    div.innerHTML = cart.map(e=>{
        total += parseInt(e.p);
        return `<div class="cart-item">${e.n} - ${e.p} درهم</div>`;
    }).join('');

    document.getElementById('total').innerText = total;
}

// SEND ORDER
function sendOrder(){
    if(cart.length === 0){
        alert("السلة فارغة");
        return;
    }

    let msg = "طلب:\n";
    cart.forEach(e=>{
        msg += `- ${e.n} (${e.p} درهم)\n`;
    });

    msg += "المجموع: " + document.getElementById('total').innerText;

    alert(msg);
}

// INIT
renderProducts();
document.getElementById('count').innerText = cart.length;

</script>

</body>
</html>
