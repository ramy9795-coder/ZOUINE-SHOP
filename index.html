<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOUINE CHOP</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet"><style>

/* ===== GAMING BLUE STYLE ===== */

:root{
--neon:#0066ff;
--dark:#020c2c;
--card:#081c5c;
--light:#e8f0ff;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Tajawal',sans-serif;
background:radial-gradient(circle at top,#071a66,#01051c);
color:white;
overflow-x:hidden;
}

header{
height:90px;
display:flex;
align-items:center;
justify-content:center;
font-family:'Cairo';
font-size:38px;
letter-spacing:3px;
background:linear-gradient(90deg,#003cff,#001a8a);
box-shadow:0 0 40px #003cff;
}

.banner{
height:180px;
background:linear-gradient(45deg,#001a8a,#003cff);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-family:'Cairo';
box-shadow:0 0 60px #003cff inset;
}

.container{
max-width:480px;
margin:auto;
padding:20px;
}

.products-grid{
display:grid;
grid-template-columns:1fr;
gap:25px;
margin-top:25px;
}

.card{
background:linear-gradient(160deg,#071a66,#020c2c);
border-radius:25px;
padding:20px;
box-shadow:0 0 30px rgba(0,102,255,.6);
transition:.4s;
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 50px #0066ff;
}

.card img{
width:100%;
border-radius:20px;
margin-bottom:15px;
}

.title{
font-size:20px;
margin-bottom:8px;
font-family:'Cairo';
}

.price{
color:#7fb3ff;
margin-bottom:15px;
font-size:18px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#0051ff,#003cff);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 25px #003cff;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.username-box{
margin-top:20px;
}

.username-box input{
width:100%;
padding:15px;
border-radius:15px;
border:none;
background:#01051c;
color:white;
font-size:16px;
box-shadow:0 0 15px #003cff inset;
}

footer{
margin-top:40px;
text-align:center;
padding:20px;
font-size:14px;
color:#9bbcff;
}

.glow{
position:absolute;
width:150px;
height:150px;
background:#003cff;
filter:blur(100px);
top:-50px;
right:-50px;
}

</style></head><body><header>
ZOUINE CHOP
</header><div class="banner">
🔥 أفضل حسابات Free Fire في المغرب 🔥
</div><div class="container"><div class="username-box">
<input id="username" placeholder="كتب اسمك باش يصلك الحساب بسرعة">
</div><div class="products-grid"><div class="card">
<div class="glow"></div>
<img src="https://i.imgur.com/qZ7QK9H.jpeg">
<div class="title">حساب أسطوري Rare Bundle + Evo Gun</div>
<div class="price">150 MAD</div>
<button onclick="order('Legend Account 150MAD')">اطلب الآن</button>
</div><div class="card">
<div class="glow"></div>
<img src="https://i.imgur.com/K9KZQ5K.jpeg">
<div class="title">حساب نادر Skins + Emotes</div>
<div class="price">90 MAD</div>
<button onclick="order('Rare Account 90MAD')">اطلب الآن</button>
</div><div class="card">
<div class="glow"></div>
<img src="https://i.imgur.com/Yq6XKQp.jpeg">
<div class="title">حساب مبتدئ مناسب للرانك</div>
<div class="price">40 MAD</div>
<button onclick="order('Starter Account 40MAD')">اطلب الآن</button>
</div></div></div><footer>
ZOUINE CHOP © 2026
</footer><script>

function order(product){

let user=document.getElementById("username").value

if(user==""){
alert("دخل اسمك")
return
}

let message="طلب جديد من ZOUINE CHOP:%0Aالاسم: "+user+"%0Aالمنتج: "+product

window.location.href="https://wa.me/212644404084?text="+message

}

</script></body>
</html>
