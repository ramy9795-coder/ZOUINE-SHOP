<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOUINE CHOP</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
background:#0b0c17;
color:white;
}

/* HEADER */
header{
background:#0a1f3d;
padding:15px;
text-align:center;
font-size:20px;
cursor:pointer;
}

/* PRODUCTS */
#products{
padding:10px;
display:grid;
gap:15px;
}

.card{
background:#111827;
border-radius:15px;
overflow:hidden;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.info{padding:12px;}

.price{color:#00aaff;font-weight:bold;}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:5px;
font-size:16px;
}

.buy{background:#00c853;color:white;}
.delete{background:red;color:white;}

/* CART */
#cart{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:none;
padding:15px;
border-radius:20px 20px 0 0;
}

/* CHAT */
#chat{display:none;margin-top:10px;}
.msg{padding:8px;margin:5px;border-radius:10px;}
.client{background:#00aaff;text-align:right;}
.admin{background:#333;text-align:left;}

/* ADMIN */
#admin{display:none;background:#111;padding:15px;}

/* LOGIN */
#login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b0c17;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

input{
padding:12px;
margin:5px;
border-radius:10px;
border:none;
width:80%;
}
</style>
</head>

<body>

<header id="header">ZOUINE CHOP</header>

<!-- LOGIN -->
<div id="login">
<input id="user" placeholder="اسم المستخدم">
<input id="pass" placeholder="كلمة السر" type="password">
<input type="file" id="avatar">
<button onclick="login()">دخول / إنشاء</button>
</div>

<!-- ADMIN -->
<div id="admin">
<h3>Admin Panel</h3>
<input id="n" placeholder="اسم المنتج">
<input id="p" placeholder="الثمن">
<input type="file" id="img">
<button onclick="addProduct()">إضافة منتج</button>

<h4>Users</h4>
<div id="users"></div>
</div>

<div id="products"></div>

<!-- CART -->
<div id="cart">
<h3>السلة</h3>
<div id="cart-items"></div>
<button onclick="openChat()">💬 تواصل</button>

<div id="chat">
<div id="messages"></div>
<input id="msg" placeholder="اكتب..." onkeypress="if(event.key==='Enter') sendMsg()">
</div>

</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

// ===== USERS =====
let users = JSON.parse(localStorage.getItem("users"))||{};
let banned = JSON.parse(localStorage.getItem("banned"))||[];
let current=null;

function login(){
let u=user.value;
let p=pass.value;

if(banned.includes(u)){
alert("🚫 تم حظرك");
return;
}

if(users[u]){
if(users[u].pass!==p){alert("خطأ");return;}
}else{
if(users[u]){alert("مستعمل");return;}
let file=avatar.files[0];
let reader=new FileReader();
reader.onload=e=>{
users[u]={pass:p,img:e.target.result};
saveUsers();
start(u);
};
reader.readAsDataURL(file);
return;
}
start(u);
}

function start(u){
current=u;
login.style.display="none";
renderProducts();
}

// ===== PRODUCTS =====
let products=JSON.parse(localStorage.getItem("db"))||[];
let cart=[];

function addProduct(){
let file=img.files[0];
let reader=new FileReader();
reader.onload=e=>{
products.push({n:n.value,p:p.value,i:e.target.result});
localStorage.setItem("db",JSON.stringify(products));
renderProducts();
};
reader.readAsDataURL(file);
}

function renderProducts(){
productsDiv.innerHTML=products.map((p,i)=>`
<div class="card">
<img src="${p.i}">
<div class="info">
<h3>${p.n}</h3>
<div class="price">${p.p} درهم</div>
<button class="buy" onclick="addToCart(${i})">شراء</button>
${current==="admin" ? `<button class="delete" onclick="del(${i})">حذف</button>`:""}
</div>
</div>
`).join('');
}

let productsDiv=document.getElementById("products");

function addToCart(i){
cart.push(products[i]);
cart.style="transform:scale(1.1)";
document.getElementById("cart").style.display="block";
}

// ===== CHAT =====
let msgs=[];

function openChat(){
chat.style.display="block";
}

function sendMsg(){
let t=msg.value;
msgs.push({t,type:"client"});
msg.value="";
renderMsgs();
sound.play();
}

function renderMsgs(){
messages.innerHTML=msgs.map(m=>`
<div class="msg ${m.type}">${m.t}</div>
`).join('');
}

// ===== ADMIN =====
let clicks=0;
header.onclick=()=>{
clicks++;
if(clicks>=10){
admin.style.display="block";
loadUsers();
clicks=0;
}
};

function loadUsers(){
usersDiv.innerHTML=Object.keys(users).map(u=>`
<div>${u} <button onclick="ban('${u}')">🚫</button></div>
`).join('');
}

let usersDiv=document.getElementById("users");

function ban(u){
banned.push(u);
localStorage.setItem("banned",JSON.stringify(banned));
alert("تم الحظر");
}

function saveUsers(){
localStorage.setItem("users",JSON.stringify(users));
}

</script>

</body>
</html>
