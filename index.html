<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOUINE CHOP</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:linear-gradient(120deg, #eef3f9, #cce0ff);
  color:#111;
}
header{
  background:#0a3d62;
  color:white;
  text-align:center;
  padding:15px;
  position:relative;
}
#online{position:absolute;top:10px;right:10px;font-size:12px;color:#0ff;}
#products{
  padding:10px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}
.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 0 10px rgba(0,0,255,0.2);
  transition:.3s;
  cursor:pointer;
  position:relative;
}
.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #0ff,0 0 25px #00f inset;
}
.card img{width:100%;height:150px;object-fit:cover;}
.info{padding:10px;text-align:center;}
.price{color:#0a3d62;font-weight:bold;}
button{
  width:100%;padding:10px;margin-top:5px;
  border:none;border-radius:10px;
  background:#0a3d62;color:white;
  cursor:pointer;
  transition:.3s;
}
button:hover{box-shadow:0 0 10px #00f;}
#cart-btn{
  position:fixed;bottom:20px;right:20px;
  background:#0a3d62;color:white;padding:12px;border-radius:50%;cursor:pointer;
  transition:.3s;
}
#cart-btn:hover{box-shadow:0 0 15px #0ff;}
#cart{
  position:fixed;bottom:0;width:100%;background:white;
  display:none;padding:15px;border-radius:20px 20px 0 0;
}
#chat{display:none;margin-top:10px;background:#f1f1f1;padding:10px;border-radius:10px;}
.msg{padding:6px;margin:5px;border-radius:8px;}
.client{background:#dcf8c6;text-align:right;}
.bot{background:white;text-align:left;}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0a3d62;color:white;padding:10px 20px;border-radius:20px;opacity:0;transition:.3s;}
.like{cursor:pointer;font-size:18px;}
.blink{animation:blink .8s infinite;}
@keyframes blink{0%{box-shadow:0 0 5px #0ff}50%{box-shadow:0 0 15px #00f}100%{box-shadow:0 0 5px #0ff}}
</style>
</head>
<body><header>
ZOUINE CHOP - FreeFire Accounts
<div id="online">🟢 1 online</div>
</header><div id="admin-panel" style="display:none;">
<h4>Admin Control</h4>
<input id="n" placeholder="اسم المنتج">
<input type="file" id="i">
<input id="p" placeholder="ثمن المنتج">
<button onclick="addProduct()">إضافة</button>
</div><div id="products"></div>
<button id="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></button>
<div id="cart">
<h3>السلة</h3>
<div id="cart-items"></div>
<h4>المجموع: <span id="total">0</span> درهم</h4>
<button onclick="toggleChat()">💬 تواصل</button>
<div id="chat">
<div id="messages"></div>
<input id="msg" placeholder="كتب..." onkeypress="if(event.key==='Enter') sendMsg()">
</div>
</div>
<div id="toast"></div>
<p id="admin-trigger" style="text-align:center;font-size:12px;color:#888;cursor:pointer;">ZOUINE CHOP</p><audio id="notif" src="https://www.myinstants.com/media/sounds/notification.mp3"></audio>

<script>
let user = localStorage.getItem("user")||prompt("دخل اسمك:");
localStorage.setItem("user",user);

let products = JSON.parse(localStorage.getItem('db'))||[];
let cart = JSON.parse(localStorage.getItem('cart'))||[];
let msgs = JSON.parse(localStorage.getItem('msgs'))||[];
let likes = JSON.parse(localStorage.getItem('likes'))||{};
let stats = JSON.parse(localStorage.getItem('stats'))||{};

setInterval(()=>{document.getElementById("online").innerText="🟢 "+(Math.floor(Math.random()*5)+1)+" online";},3000);

document.getElementById('admin-trigger').onclick=function(){if(prompt("كود الادمن")==="123456"){document.getElementById('admin-panel').style.display='block';}}

function toast(msg){let t=document.getElementById('toast');t.innerText=msg;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,2000);}

function addProduct(){let n=document.getElementById('n').value;let file=document.getElementById('i').files[0];let p=document.getElementById('p').value;let reader=new FileReader();reader.onload=function(e){products.push({n,i:e.target.result,p});localStorage.setItem('db',JSON.stringify(products));renderProducts();toast('✔ تم الإضافة');};if(file) reader.readAsDataURL(file);}

function renderProducts(){let div=document.getElementById('products');
div.innerHTML=products.map((p,i)=>`<div class="card ${stats[i]>2?'blink':''}"><img src="${p.i}"><div class="info"><h3>${p.n}</h3><div class="price">${p.p} درهم</div><div class="like" onclick="like(${i});event.stopPropagation()">${likes[i]?'❤️':'🤍'}</div><button onclick="addToCart(${i});event.stopPropagation()">شراء</button><button onclick="del(${i});event.stopPropagation()">🗑️</button></div></div>`).join('');}

function like(i){likes[i]=!likes[i];localStorage.setItem('likes',JSON.stringify(likes));renderProducts();}
function del(i){products.splice(i,1);localStorage.setItem('db',JSON.stringify(products));renderProducts();toast('🗑️ تم الحذف');}
function addToCart(i){cart.push(products[i]);stats[i]=(stats[i]||0)+1;localStorage.setItem('stats',JSON.stringify(stats));localStorage.setItem('cart',JSON.stringify(cart));
