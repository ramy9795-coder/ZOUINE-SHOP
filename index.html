<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOUINE CHOP</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
background:#f4f7fb;
color:#0a3d62;
}

/* HEADER */
header{
background:#0a3d62;
color:white;
text-align:center;
padding:15px;
cursor:pointer;
}

#profileBox{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
margin-top:5px;
}

#profileBox img{
width:35px;
height:35px;
border-radius:50%;
border:2px solid white;
}

/* BANNER */
#banner img{
width:100%;
height:180px;
object-fit:cover;
}

/* PRODUCTS */
#products{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.info{padding:10px;}
.price{font-weight:bold;}

.buy{background:#28a745;color:white;}
.delete{background:red;color:white;}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
margin-top:5px;
}

/* LOGIN */
#login{
position:fixed;
top:0;
width:100%;
height:100%;
background:#f4f7fb;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* AVATARS */
#avatars{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin:10px;
}

#avatars img{
width:60px;
height:60px;
border-radius:50%;
cursor:pointer;
border:3px solid transparent;
}

.selected{
border:3px solid #0a3d62;
}

/* ADMIN */
#admin{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
overflow:auto;
padding:15px;
}

/* FREE IMAGE AREA */
#freeImages img{
width:100%;
margin-top:10px;
border-radius:15px;
}
</style>
</head>

<body>

<header onclick="adminClick()">
ZOUINE CHOP
<div id="profileBox" onclick="openProfile(event)">
<img id="profileImg">
<span id="profileName"></span>
</div>
</header>

<div id="banner">
<img src="https://via.placeholder.com/800x300?text=ZOUINE+CHOP">
</div>

<div id="freeImages"></div>

<div id="products"></div>

<!-- LOGIN -->
<div id="login">
<input id="user" placeholder="اسم المستخدم">
<input id="pass" type="password" placeholder="كلمة السر">

<div id="avatars">
<img src="https://i.pravatar.cc/100?img=1" onclick="selectAvatar(this)">
<img src="https://i.pravatar.cc/100?img=2" onclick="selectAvatar(this)">
<img src="https://i.pravatar.cc/100?img=3" onclick="selectAvatar(this)">
</div>

<button onclick="register()">🆕 إنشاء حساب</button>
<button onclick="loginUser()">🔐 تسجيل الدخول</button>
</div>

<!-- ADMIN PANEL -->
<div id="admin">
<h2>ADMIN PANEL</h2>

<h3>➕ إضافة منتج</h3>
<input id="n" placeholder="اسم">
<input id="p" placeholder="ثمن">
<input type="file" id="img">
<button onclick="addProduct()">إضافة</button>

<h3>🖼️ إضافة صورة في الموقع</h3>
<input type="file" id="freeImg">
<button onclick="addFreeImage()">إضافة صورة</button>

<h3>👥 المستخدمين</h3>
<div id="users"></div>

<button onclick="closeAdmin()">❌ إغلاق</button>
</div>

<script>

/* DATA */
let users=JSON.parse(localStorage.getItem("users"))||{};
let banned=JSON.parse(localStorage.getItem("banned"))||[];
let products=JSON.parse(localStorage.getItem("products"))||[];
let freeImages=JSON.parse(localStorage.getItem("freeImages"))||[];

let current=null;
let selectedAvatar="";

/* LOGIN */
function register(){
let u=user.value;
let p=pass.value;

if(users[u]){alert("❌ مستعمل");return;}
if(!selectedAvatar){alert("❗ اختار صورة");return;}

users[u]={pass:p,img:selectedAvatar};
saveUsers();
start(u);
}

function loginUser(){
let u=user.value;
let p=pass.value;

if(banned.includes(u)){alert("🚫 محظور");return;}
if(!users[u] || users[u].pass!==p){alert("❌ خطأ");return;}

start(u);
}

function start(u){
current=u;
login.style.display="none";
profileImg.src=users[u].img;
profileName.innerText=u;
render();
}

/* AVATAR */
function selectAvatar(img){
document.querySelectorAll("#avatars img").forEach(i=>i.classList.remove("selected"));
img.classList.add("selected");
selectedAvatar=img.src;
}

/* PRODUCTS */
function render(){
productsDiv.innerHTML=products.map((p,i)=>`
<div class="card">
<img src="${p.i}">
<div class="info">
<h3>${p.n}</h3>
<div class="price">${p.p} درهم</div>
<button class="buy">شراء</button>
${current==="admin"?`<button class="delete" onclick="del(${i})">حذف</button>`:""}
</div>
</div>
`).join('');

freeImagesDiv.innerHTML=freeImages.map(img=>`<img src="${img}">`).join('');
}

let productsDiv=document.getElementById("products");
let freeImagesDiv=document.getElementById("freeImages");

function addProduct(){
let file=img.files[0];
let reader=new FileReader();
reader.onload=e=>{
products.push({n:n.value,p:p.value,i:e.target.result});
localStorage.setItem("products",JSON.stringify(products));
render();
};
reader.readAsDataURL(file);
}

function del(i){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
render();
}

/* FREE IMAGES */
function addFreeImage(){
let file=freeImg.files[0];
let reader=new FileReader();
reader.onload=e=>{
freeImages.push(e.target.result);
localStorage.setItem("freeImages",JSON.stringify(freeImages));
render();
};
reader.readAsDataURL(file);
}

/* ADMIN */
let clicks=0;
function adminClick(){
clicks++;
if(clicks>=10){
admin.style.display="block";
loadUsers();
clicks=0;
}
}

function closeAdmin(){
admin.style.display="none";
}

function loadUsers(){
usersDiv.innerHTML=Object.keys(users).map(u=>`
<div>${u} 
<button onclick="ban('${u}')">🚫</button>
</div>
`).join('');
}

let usersDiv=document.getElementById("users");

function ban(u){
banned.push(u);
localStorage.setItem("banned",JSON.stringify(banned));
alert("تم الحظر");
}

/* SAVE */
function saveUsers(){
localStorage.setItem("users",JSON.stringify(users));
}

</script>

</body>
</html>
