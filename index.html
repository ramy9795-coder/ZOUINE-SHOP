<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZOUINE CHOP</title>

<style>
body{
    font-family:sans-serif;
    background:#0d0d0d;
    color:white;
}

#products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:15px;
    padding:15px;
}

.card{
    background:#1a1a1a;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:10px;
}

.price{
    color:#00aaff;
    margin:5px 0;
}

button{
    padding:8px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

#cart-modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.cart-box{
    background:#111;
    padding:20px;
    width:90%;
    max-width:400px;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}

#admin-panel{
    display:none;
    padding:15px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
}
</style>
</head>

<body>

<h2 style="text-align:center;">ZOUINE CHOP</h2>

<div id="admin-panel">
    <input id="n" placeholder="اسم المنتج">
    <input type="file" id="i" accept="image/*">
    <input id="p" placeholder="الثمن">
    <button onclick="addProduct()">إضافة</button>
</div>

<div id="products-grid"></div>

<button onclick="toggleCart()">🛒 (<span id="cart-count">0</span>)</button>

<div id="cart-modal">
    <div class="cart-box">
        <h3>السلة</h3>
        <div id="cart-items-list"></div>
        <h4>المجموع: <span id="total-price">0</span> درهم</h4>
        <button onclick="sendOrder()">إرسال الطلب</button>
    </div>
</div>

<footer>
<p id="admin-trigger">ZOUINE CHOP © 2026</p>
</footer>

<script>

let products = JSON.parse(localStorage.getItem('zouine_v4_db')) || [];
let cart = JSON.parse(localStorage.getItem('zouine_v4_cart')) || [];
let messages = JSON.parse(localStorage.getItem('zouine_msgs')) || [];

// LOGIN
document.getElementById('admin-trigger').onclick = function() {

    let pass = prompt("كلمة السر:");

    if(pass === "123"){
        localStorage.setItem("role","admin");
        document.getElementById('admin-panel').style.display = 'block';
        renderProducts();
    }

    else if(pass === "12345"){
        localStorage.setItem("role","chat");
        alert("وضع الشات مفعل");
    }
}

// AUTO LOGIN
if(localStorage.getItem("role") === "admin"){
    document.getElementById('admin-panel').style.display = 'block';
}

// ADD PRODUCT WITH IMAGE
function addProduct() {
    let n = document.getElementById('n').value;
    let file = document.getElementById('i').files[0];
    let p = document.getElementById('p').value;

    if(n && p) {

        if(file){
            let reader = new FileReader();

            reader.onload = function(e){
                products.push({n, i: e.target.result, p});
                localStorage.setItem('zouine_v4_db', JSON.stringify(products));
                renderProducts();
            }

            reader.readAsDataURL(file);

        } else {
            products.push({n, i:"", p});
            localStorage.setItem('zouine_v4_db', JSON.stringify(products));
            renderProducts();
        }
    }
}

// RENDER PRODUCTS
function renderProducts() {
    let grid = document.getElementById('products-grid');

    grid.innerHTML = products.map((prod, idx) => `
        <div class="card">
            <img src="${prod.i || 'https://via.placeholder.com/400'}">
            <h3>${prod.n}</h3>
            <div class="price">${prod.p} درهم</div>
            <button onclick="addToCart(${idx})">إضافة إلى السلة</button>
        </div>
    `).join('');
}

// CART
function addToCart(idx) {
    cart.push(products[idx]);
    localStorage.setItem('zouine_v4_cart', JSON.stringify(cart));
    document.getElementById('cart-count').innerText = cart.length;
}

function toggleCart() {
    let modal = document.getElementById('cart-modal');
    modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    renderCart();
}

function renderCart() {
    let list = document.getElementById('cart-items-list');
    let total = 0;

    list.innerHTML = cart.map((item, idx) => {
        total += parseInt(item.p);
        return `<div class="cart-item">
            <span>${item.n}</span>
            <span>${item.p} درهم</span>
        </div>`;
    }).join('');

    document.getElementById('total-price').innerText = total;
}

// SEND ORDER (بدل واتساب)
function sendOrder() {

    if(cart.length === 0) return alert("السلة فارغة!");

    let text = "طلب جديد:\n";

    cart.forEach(item => {
        text += `- ${item.n} (${item.p} درهم)\n`;
    });

    text += "\nالمجموع: " + document.getElementById('total-price').innerText + " درهم";

    messages.push({text});
    localStorage.setItem('zouine_msgs', JSON.stringify(messages));

    alert("تم إرسال الطلب بنجاح!");
}

// INIT
renderProducts();
document.getElementById('cart-count').innerText = cart.length;

</script>

</body>
</html>
