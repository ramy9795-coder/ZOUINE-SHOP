<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOUINE CHOP GLOBAL</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
/* نفس التصميم القديم + تحسين glow */
body{margin:0;font-family:'Cairo';background:#050816;color:#fff;}
header{padding:15px;text-align:center;background:#001f3d;box-shadow:0 0 15px #00f;}
#products{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;}
.card{background:#0a1f3d;border-radius:15px;border:1px solid #00f;overflow:hidden;transition:.3s;}
.card:hover{transform:scale(1.05);box-shadow:0 0 15px #0ff;}
.card img{width:100%;height:140px;object-fit:cover;}
.info{text-align:center;padding:10px;}
.price{color:#0ff;}
.btn{background:#001f3d;color:#0ff;border:none;border-radius:10px;padding:8px;width:100%;}
#cart{position:fixed;bottom:0;width:100%;background:#001f3d;padding:15px;display:none;}
#chat{display:none;background:#000c1f;padding:10px;margin-top:10px;}
.msg{padding:5px;margin:5px;border-radius:8px;}
.client{background:#004c80;}
.bot{background:#0a1f3d;}
</style>
</head>

<body>

<header>🌍 ZOUINE CHOP GLOBAL</header>

<div id="products"></div>

<div id="cart">
<h3>🛒 المشتريات</h3>
<div id="cart-items"></div>
<button class="btn" onclick="toggleChat()">💬 Chat</button>

<div id="chat">
<div id="messages"></div>
<input id="msg" placeholder="كتب..." onkeypress="if(event.key==='Enter') sendMsg()">
</div>
</div>

<script>

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "PUT-YOURS",
  authDomain: "PUT-YOURS",
  projectId: "PUT-YOURS"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN */
auth.signInAnonymously();

/* PRODUCTS REALTIME */
db.collection("products").onSnapshot(snap=>{
let div=document.getElementById("products");
div.innerHTML="";
snap.forEach(doc=>{
let p=doc.data();
div.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="info">
<h3>${p.name}</h3>
<div class="price">${p.price} درهم</div>
<button class="btn" onclick="buy('${doc.id}')">شراء</button>
</div>
</div>`;
});
});

/* BUY */
function buy(id){
db.collection("cart").add({product:id,user:auth.currentUser.uid});
document.getElementById("cart").style.display="block";
}

/* CHAT REALTIME */
function sendMsg(){
let text=document.getElementById("msg").value;
db.collection("chat").add({
text:text,
user:auth.currentUser.uid,
time:Date.now()
});
document.getElementById("msg").value="";
}

/* LISTEN CHAT */
db.collection("chat").orderBy("time")
.onSnapshot(snap=>{
let box=document.getElementById("messages");
box.innerHTML="";
snap.forEach(doc=>{
let m=doc.data();
box.innerHTML+=`
<div class="msg ${m.user===auth.currentUser.uid?'client':'bot'}">
${m.text}
</div>`;
});
});

/* TOGGLE */
function toggleChat(){
let c=document.getElementById("chat");
c.style.display=c.style.display==="block"?"none":"block";
}

</script>

</body>
</html>
