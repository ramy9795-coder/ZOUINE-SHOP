<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOUINE SHOP</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{
    background: radial-gradient(circle at top,#0a0aff,#050520,#020212);
    color:white;
    min-height:100vh;
    overflow-x:hidden;
}

body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(0,119,255,0.15),transparent);
    animation:shine 5s linear infinite;
    pointer-events:none;
}

@keyframes shine{
    0%{transform:translateX(-100%)}
    100%{transform:translateX(100%)}
}

header{
    text-align:center;
    padding:30px 20px;
    font-size:60px;
    font-weight:800;
    letter-spacing:3px;
    color:white;
    text-shadow:0 0 20px #0080ff;
}

.hero{
    text-align:center;
    padding:20px;
    font-size:35px;
    font-weight:bold;
}

.container{
    width:90%;
    margin:auto;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
    margin-top:30px;
}

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,153,255,0.4);
    border-radius:20px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,153,255,0.25);
    backdrop-filter:blur(8px);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 30px rgba(0,153,255,0.6);
}

.upload-box{
    width:100%;
    height:220px;
    border:2px dashed rgba(255,255,255,0.4);
    border-radius:15px;
    position:relative;
    overflow:hidden;
    margin-bottom:15px;
    cursor:pointer;
}

.upload-box img{
    position:absolute;
    top:0;
    left:0;
    width:150px;
    cursor:move;
    resize:both;
    overflow:auto;
}

button{
    background:linear-gradient(90deg,#0066ff,#00aaff);
    border:none;
    color:white;
    padding:12px 25px;
    border-radius:12px;
    cursor:pointer;
    font-size:18px;
    margin-top:10px;
}

input[type=file]{
    display:none;
}
</style>
</head>
<body>

<header>ZOUINE Shop</header>

<section class="hero">
أفضل حسابات Free Fire في العالم
</section>

<div class="container">
    <div class="cards">

        <div class="card">
            <label class="upload-box" for="img1" id="box1">
                <img id="preview1">
            </label>
            <input type="file" id="img1" accept="image/*">
            <h3>اسم الحساب</h3>
            <p>المستوى | التفاصيل</p>
            <button>عرض الحساب</button>
        </div>

        <div class="card">
            <label class="upload-box" for="img2" id="box2">
                <img id="preview2">
            </label>
            <input type="file" id="img2" accept="image/*">
            <h3>اسم الحساب</h3>
            <p>المستوى | التفاصيل</p>
            <button>عرض الحساب</button>
        </div>

        <div class="card">
            <label class="upload-box" for="img3" id="box3">
                <img id="preview3">
            </label>
            <input type="file" id="img3" accept="image/*">
            <h3>اسم الحساب</h3>
            <p>المستوى | التفاصيل</p>
            <button>عرض الحساب</button>
        </div>

    </div>
</div>

<script>
function setupUpload(inputId, previewId) {
    const input = document.getElementById(inputId);
    const preview = document.getElementById(previewId);

    const savedImage = localStorage.getItem(previewId);
    const savedTop = localStorage.getItem(previewId + "_top");
    const savedLeft = localStorage.getItem(previewId + "_left");
    const savedWidth = localStorage.getItem(previewId + "_width");

    if(savedImage){
        preview.src = savedImage;
        preview.style.top = savedTop || "0px";
        preview.style.left = savedLeft || "0px";
        preview.style.width = savedWidth || "150px";
    }

    input.addEventListener("change", function(){
        const file = this.files[0];
        const reader = new FileReader();

        reader.onload = function(e){
            preview.src = e.target.result;
            localStorage.setItem(previewId,e.target.result);
        }

        reader.readAsDataURL(file);
    });

    let isDragging = false;
    let offsetX, offsetY;

    preview.addEventListener("mousedown", function(e){
        isDragging = true;
        offsetX = e.offsetX;
        offsetY = e.offsetY;
    });

    document.addEventListener("mousemove", function(e){
        if(isDragging){
            preview.style.left = (e.pageX - preview.parentElement.offsetLeft - offsetX) + "px";
            preview.style.top = (e.pageY - preview.parentElement.offsetTop - offsetY) + "px";

            localStorage.setItem(previewId+"_left",preview.style.left);
            localStorage.setItem(previewId+"_top",preview.style.top);
        }
    });

    document.addEventListener("mouseup", function(){
        isDragging = false;
        localStorage.setItem(previewId+"_width",preview.style.width);
    });
}

setupUpload("img1","preview1");
setupUpload("img2","preview2");
setupUpload("img3","preview3");
</script>

</body>
</html>
