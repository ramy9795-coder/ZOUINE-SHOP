<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOUINE CHOP</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet"><style>

body{
margin:0;
font-family:'Tajawal',sans-serif;
background:#061b4a;
color:white;
}

header{
font-family:'Cairo';
text-align:center;
font-size:32px;
padding:20px;
background:#0b2cff;
}

.container{
max-width:420px;
margin:auto;
padding:15px;
}

.card{
background:#0a2472;
padding:20px;
border-radius:20px;
margin-top:20px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#04133a;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:#2c66ff;
color:white;
font-size:16px;
cursor:pointer;
}

.product{
background:#04133a;
padding:12px;
margin-top:12px;
border-radius:12px;
}

.hidden{display:none}

</style></head><body><header>ZOUINE CHOP</header><div class="container"><!-- LOGIN --><div id="loginPage" class="card">
<h2>إنشاء حساب أو تسجيل الدخول</h2><input id="username" placeholder="اسم المستخدم">
<input id="password" placeholder="كلمة المرور" type="password"><button onclick="register()">إنشاء حساب</button> <button onclick="login()">تسجيل الدخول</button>

</div><!-- STORE --><div id="storePage" class="card hidden">
<h2>مرحبا بك في متجر ZOUINE CHOP 👑</h2><div class="product">
حساب Free Fire أسطوري - 150 MAD
<button onclick="order('حساب Free Fire أسطوري - 150 MAD')">طلب الحساب</button>
</div><div class="product">
حساب Free Fire نادر - 90 MAD
<button onclick="order('حساب Free Fire نادر - 90 MAD')">طلب الحساب</button>
</div><div class="product">
حساب Free Fire مبتدئ - 40 MAD
<button onclick="order('حساب Free Fire مبتدئ - 40 MAD')">طلب الحساب</button>
</div><button onclick="logout()">تسجيل الخروج</button>

</div></div><script>

function register(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value

if(user==""||pass==""){
alert("دخل اسم المستخدم وكلمة المرور")
return
}

localStorage.setItem("user",user)
localStorage.setItem("pass",pass)

alert("تم إنشاء الحساب ✅ دابا دير تسجيل الدخول")

}

function login(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value

let savedUser=localStorage.getItem("user")
let savedPass=localStorage.getItem("pass")

if(user==savedUser && pass==savedPass){

loginPage.classList.add("hidden")
storePage.classList.remove("hidden")

}else{
alert("المعلومات غير صحيحة")
}

}

function logout(){

storePage.classList.add("hidden")
loginPage.classList.remove("hidden")

}

function order(productName){

let username=localStorage.getItem("user")

let message="طلب جديد من موقع ZOUINE CHOP:%0A"+
"اسم المستخدم: "+username+"%0A"+
"المنتج: "+productName

let phone="212644404084"

window.location.href="https://wa.me/"+phone+"?text="+message

}

</script></body>
</html>
