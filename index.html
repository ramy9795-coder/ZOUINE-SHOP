<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOUINE CHOP</title><!-- Google Fonts similar to poster style --><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&family=Tajawal:wght@500;700&display=swap" rel="stylesheet"><style>

:root{
--main:#4b00ff;
--secondary:#0f5bff;
--dark:#0a0a1f;
--card:#121233;
--accent:#00b7ff;
}

body{
margin:0;
font-family:'Tajawal',sans-serif;
background:linear-gradient(135deg,#1b0066,#12003f,#000);
color:white;
}

header{
font-family:'Cairo',sans-serif;
font-weight:800;
font-size:28px;
letter-spacing:2px;
text-align:center;
padding:18px;
background:linear-gradient(90deg,#3c00ff,#007bff);
box-shadow:0 0 20px #000;
}

.logo{
font-size:34px;
color:white;
}

.container{
padding:15px;
}

.section-title{
font-family:'Cairo';
font-size:22px;
margin-bottom:10px;
color:#00b7ff;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:8px;
border:none;
background:#1c1c44;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#4b00ff,#007bff);
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.card{
background:var(--card);
border-radius:16px;
padding:12px;
margin-bottom:15px;
box-shadow:0 0 15px rgba(0,0,0,.6);
}

.card img{
width:100%;
border-radius:12px;
}

.price{
color:#00eaff;
font-size:18px;
margin:5px 0;
}

.hidden{
display:none;
}

.chatbox{
height:220px;
overflow-y:auto;
background:#070721;
padding:10px;
border-radius:12px;
margin-bottom:10px;
}

.message{
background:#1c1c44;
padding:8px;
margin:5px 0;
border-radius:8px;
}

.admin-panel{
background:#070721;
padding:15px;
border-radius:15px;
}

footer{
text-align:center;
padding:15px;
font-size:13px;
color:#aaa;
}

</style></head><body><header>
<div class="logo">ZOUINE CHOP</div>
متجر بيع الحسابات والخدمات الرقمية
</header><!-- LOGIN --><div class="container" id="authSection"><div class="section-title">تسجيل الدخول / إنشاء حساب</div><input id="firstName" placeholder="الاسم">
<input id="lastName" placeholder="النسب">
<input id="phone" placeholder="رقم الهاتف">
<input id="password" placeholder="كلمة المرور" type="password"><button onclick="register()">إنشاء حساب</button> <button onclick="login()">تسجيل الدخول</button>

</div><!-- STORE --><div class="container hidden" id="storeSection"><div class="section-title">الحسابات المتوفرة</div><div id="products"></div></div><!-- CHAT --><div class="container hidden" id="chatSection"><div class="section-title">الدردشة داخل الموقع</div><div class="chatbox" id="chatbox"></div><input id="chatInput" placeholder="اكتب رسالتك">
<button onclick="sendMessage()">إرسال</button></div><!-- ADMIN LOGIN --><div class="container hidden" id="adminUnlock"><div class="section-title">لوحة تحكم الأدمن</div><input id="adminCode" placeholder="كود الأدمن">
<button onclick="unlockAdmin()">فتح لوحة الأدمن</button></div><!-- ADMIN PANEL --><div class="container hidden admin-panel" id="adminPanel"><div class="section-title">إضافة حساب جديد</div><input id="productName" placeholder="اسم الحساب">
<input id="productPrice" placeholder="الثمن">
<input id="productImage" placeholder="رابط الصورة"><button onclick="addProduct()">إضافة الحساب</button>

</div><footer>
ZOUINE CHOP © 2026 جميع الحقوق محفوظة
</footer><script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let productsData = JSON.parse(localStorage.getItem("products")) || [];
let chat = JSON.parse(localStorage.getItem("chat")) || [];


function register(){

let user={
firstName:firstName.value,
lastName:lastName.value,
phone:phone.value,
password:password.value
};

users.push(user);

localStorage.setItem("users",JSON.stringify(users));

alert("تم إنشاء الحساب بنجاح");

}


function login(){

let found = users.find(u=>

u.firstName==firstName.value &&

u.lastName==lastName.value &&

u.password==password.value

);

if(found){

alert("مرحبا بك في ZOUINE CHOP");



 authSection.classList.add("hidden");
 storeSection.classList.remove("hidden");
 chatSection.classList.remove("hidden");
 adminUnlock.classList.remove("hidden");

 loadProducts();
 loadChat();

}

else{
alert("معلومات خاطئة");
}

}


function addProduct(){

let product={
name:productName.value,
price:productPrice.value,
image:productImage.value
};

productsData.push(product);

localStorage.setItem("products",JSON.stringify(productsData));

loadProducts();

}


function loadProducts(){

products.innerHTML="";

productsData.forEach(p=>{

products.innerHTML+=`

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<div class="price">${p.price} MAD</div>

<button onclick="orderProduct('${p.name}')">طلب الحساب</button>

</div>`;

});

}


function orderProduct(name){

chat.push("طلب جديد: "+name);

localStorage.setItem("chat",JSON.stringify(chat));

loadChat();

}


function sendMessage(){

chat.push(chatInput.value);

localStorage.setItem("chat",JSON.stringify(chat));

loadChat();

chatInput.value="";

}


function loadChat(){

chatbox.innerHTML="";

chat.forEach(msg=>{

chatbox.innerHTML+=`<div class="message">${msg}</div>`;

});

}


let attempts=0;

function unlockAdmin(){

if(adminCode.value=="197803"){

adminPanel.classList.remove("hidden");

}

else{

attempts++;

if(attempts>=5){

alert("تم فتح وضع الأدمن السري");

adminPanel.classList.remove("hidden");

}

}

}

</script></body>
</html>
