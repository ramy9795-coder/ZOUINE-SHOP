<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOUINE Chop - Boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background:#050816;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  background:#001f3d;
  cursor:pointer;
  box-shadow:0 0 20px #00f;
}
.title{
  color:#0ff;
  text-shadow:0 0 10px #0ff,0 0 30px #00f;
  font-size:24px;
}
.sub{
  font-size:14px;
  color:#aaa;
}

/* PRODUCTS GRID */
#products{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}
.card{
  background:#0a1f3d;
  border-radius:15px;
  overflow:hidden;
  transition:.3s;
}
.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #0ff;
}
.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}
.info{
  padding:10px;
  text-align:center;
}
.price{
  color:#0ff;
  font-weight:bold;
}
.btn{
  background:#001f3d;
  color:#0ff;
  border:none;
  padding:8px;
  border-radius:10px;
  width:100%;
  cursor:pointer;
  transition:.3s;
}
.btn:hover{
  background:#00f;
  color:#fff;
}

/* CHAT BOX */
#chatBox{
  position:fixed;
  bottom:0;
  width:100%;
  background:#001f3d;
  display:none;
  padding:10px;
  border-top:3px solid #0ff;
}
#chat{
  height:200px;
  overflow:auto;
  background:#000c1f;
  padding:10px;
  border-radius:10px;
}
.msg{
  background:#0a1f3d;
  margin:5px;
  padding:6px;
  border-radius:8px;
}
input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:5px;
  color:white;
  background:#0a1f3d;
}
</style>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

</head>
<body>

<header id="header">
  <h2 class="title">💀 ZOUINE Chop 💀</h2>
  <p class="sub">🔥 FreeFire Accounts 🔥</p>
</header>

<div id="products"></div>

<div id="chatBox">
  <h3>💬 Chat en direct</h3>
  <div id="chat"></div>
  <input id="msg" placeholder="Écris ton message..." onkeypress="if(event.key==='Enter') sendMsg()">
</div>

<script>
// ======== FIREBASE CONFIG ========
const firebaseConfig = {
  apiKey: "AIzaSyDTDvPtHxP_7z05fbzrSqeHzk-p4eHNYYI",
  authDomain: "zouine-chop.firebaseapp.com",
  projectId: "zouine-chop",
  storageBucket: "zouine-chop.appspot.com",
  messagingSenderId: "363784604705",
  appId: "1:363784604705:web:REPLACE_WITH_YOUR_WEB_APP_ID"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
firebase.auth().signInAnonymously().catch(console.error);

// ======== PRODUITS ========
const products = [
  {name:"Compte VIP 1", price:50, img:"https://via.placeholder.com/400x400?text=VIP1"},
  {name:"Compte VIP 2", price:70, img:"https://via.placeholder.com/400x400?text=VIP2"},
  {name:"Compte VIP 3", price:100, img:"https://via.placeholder.com/400x400?text=VIP3"},
];

function renderProducts(){
  let html = "";
  products.forEach((p)=>{
    html += `<div class="card">
      <img src="${p.img}">
      <div class="info">
        <h3>${p.name}</h3>
        <div class="price">${p.price} DH</div>
        <button class="btn" onclick="openChat()">Contacter</button>
      </div>
    </div>`;
  });
  document.getElementById("products").innerHTML = html;
}

// ======== CHAT REALTIME ========
const chatRef = db.collection("chat");

function renderChat(messages){
  const chatDiv = document.getElementById("chat");
  chatDiv.innerHTML = "";
  messages.forEach(m=>{
    chatDiv.innerHTML += `<div class="msg">${m.text}</div>`;
  });
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

// Écoute en temps réel
chatRef.orderBy("timestamp").onSnapshot(snapshot=>{
  const msgs = snapshot.docs.map(doc => doc.data());
  renderChat(msgs);
});

function sendMsg(){
  const text = document.getElementById("msg").value;
  if(!text) return;
  chatRef.add({
    text,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  });
  document.getElementById("msg").value = "";
}

function openChat(){
  document.getElementById("chatBox").style.display = "block";
}

/* INIT */
renderProducts();
</script>

</body>
</html>
