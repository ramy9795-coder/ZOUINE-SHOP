<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOD MODE STORE - Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Cairo';
  background:#050816;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  background:#001f3d;
  cursor:pointer;
  box-shadow:0 0 20px #00f;
}
.title{
  color:#0ff;
  text-shadow:0 0 10px #0ff,0 0 30px #00f;
  font-size:24px;
}
.sub{
  font-size:14px;
  color:#aaa;
}

/* PRODUCTS GRID */
#products{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}
.card{
  background:#0a1f3d;
  border-radius:15px;
  overflow:hidden;
  transition:.3s;
}
.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #0ff;
}
.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}
.info{
  padding:10px;
  text-align:center;
}
.price{
  color:#0ff;
}
.btn{
  background:#001f3d;
  color:#0ff;
  border:none;
  padding:8px;
  border-radius:10px;
  width:100%;
  cursor:pointer;
}

/* CHAT BOX */
#chatBox{
  position:fixed;
  bottom:0;
  width:100%;
  background:#001f3d;
  display:none;
  padding:10px;
}
#chat{
  height:200px;
  overflow:auto;
  background:#000c1f;
  padding:10px;
  border-radius:10px;
}
.msg{
  background:#0a1f3d;
  margin:5px;
  padding:6px;
  border-radius:8px;
}
input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:5px;
}
</style>
</head>

<body>

<header id="header">
  <h2 class="title">💀 GOD MODE STORE 💀</h2>
  <p class="sub">🔥 FreeFire Accounts 🔥</p>
</header>

<div id="products"></div>

<div id="chatBox">
  <h3>💬 تواصل معي مباشرة</h3>
  <div id="chat"></div>
  <input id="msg" placeholder="كتب الرسالة..." onkeypress="if(event.key==='Enter') sendMsg()">
</div>

<script>
/* ======== PRODUCTS ======== */
let products = [
  {name:"حساب VIP 1", price:50, img:"https://via.placeholder.com/400x400?text=VIP1"},
  {name:"حساب VIP 2", price:70, img:"https://via.placeholder.com/400x400?text=VIP2"},
  {name:"حساب VIP 3", price:100, img:"https://via.placeholder.com/400x400?text=VIP3"},
];

function renderProducts(){
  let html = "";
  products.forEach((p)=>{
    html += `<div class="card">
      <img src="${p.img}">
      <div class="info">
        <h3>${p.name}</h3>
        <div class="price">${p.price} درهم</div>
        <button class="btn" onclick="openChat()">تواصل معي</button>
      </div>
    </div>`;
  });
  document.getElementById("products").innerHTML = html;
}

/* ======== CHAT ======== */
let messages = JSON.parse(localStorage.getItem("messages")) || [];

function renderChat(){
  let html = "";
  messages.forEach(m=>{
    html += `<div class="msg">${m}</div>`;
  });
  document.getElementById("chat").innerHTML = html;
  document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

function sendMsg(){
  let text = document.getElementById("msg").value;
  if(!text) return;
  messages.push(text);
  localStorage.setItem("messages", JSON.stringify(messages));
  document.getElementById("msg").value = "";
  renderChat();
}

function openChat(){
  document.getElementById("chatBox").style.display = "block";
}

/* INIT */
renderProducts();
renderChat();
</script>

</body>
</html>
