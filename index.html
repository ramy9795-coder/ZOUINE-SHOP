<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atlas Chicken</title>
<style>
body{
font-family:Arial;
margin:0;
background:#fff5f5;
}header{ background:linear-gradient(90deg,#d40000,#ff3b3b); color:white; text-align:center; padding:20px; }

.logo{ font-size:30px; font-weight:bold; cursor:pointer; }

.products{ display:flex; flex-wrap:wrap; justify-content:center; padding:20px; }

.card{ background:white; border-radius:14px; margin:12px; width:220px; padding:10px; text-align:center; box-shadow:0 6px 18px rgba(0,0,0,0.08); }

.card img{ width:100%; height:140px; object-fit:cover; border-radius:10px; }

button{ background:linear-gradient(90deg,#d40000,#ff3b3b); color:white; border:none; padding:8px 14px; margin:4px; border-radius:7px; cursor:pointer; }

#cart{ position:fixed; top:0; right:0; width:300px; height:100%; background:white; box-shadow:-4px 0 15px rgba(0,0,0,0.15); padding:20px; display:none; overflow:auto; }

#adminPanel{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; border:3px solid red; display:none; }

.cartBtn{ position:fixed; bottom:20px; left:20px; background:#d40000; color:white; padding:15px; border-radius:50%; cursor:pointer; }

.whatsapp{ position:fixed; bottom:20px; right:20px; background:#25D366; color:white; padding:15px; border-radius:50%; text-decoration:none; }

input{ margin:6px; padding:6px; width:95%; } </style>

</head>
<body><header>
<div class="logo" onclick="secretClick()">ATLAS CHICKEN</div>
<p>Livraison gratuit à partir de 70 DH</p>
<p>📞 06 99 00 74 51</p>
</header><!-- 3D Tacos Animation Hero --><section style="text-align:center;padding:40px">
<img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png" id="taco3d" style="width:140px;filter:drop-shadow(0px 10px 15px rgba(0,0,0,0.2));">
<h2 style="color:#d40000">Bienvenue chez Atlas Chicken</h2>
<p style="opacity:.7">Meilleurs Tacos à Casablanca</p>
</section><section class="products" id="products"></section><!-- CART --><div id="cart">
<h3>🛒 Panier</h3>
<div id="cartItems"></div>
<button onclick="sendOrder()">Commander via WhatsApp</button>
<button onclick="closeCart()">Fermer</button>
</div><!-- ADMIN PANEL --><div id="adminPanel">
<h3>Admin Panel</h3>
<input id="name" placeholder="Nom produit">
<input id="price" placeholder="Prix produit">
<input type="file" id="imageInput" accept="image/*">
<button onclick="addProduct()">Ajouter produit</button>
<button onclick="closeAdmin()">Fermer</button>
</div><!-- FLOAT BUTTONS --><div class="cartBtn" onclick="openCart()">🛒</div>
<a class="whatsapp" href="https://wa.me/212699007451" target="_blank">💬</a><script>
let clicks=0;
let cart=[];

if(!localStorage.getItem("products")){
localStorage.setItem("products",JSON.stringify([]));
}

function displayProducts(){
let container=document.getElementById("products");
container.innerHTML="";
let products=JSON.parse(localStorage.getItem("products"));

products.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<p>${p.price}</p>
<button onclick="addToCart('${p.name}')">Ajouter au panier</button>
<button onclick="deleteProduct(${i})">Supprimer</button>
</div>`;
});
}

function addProduct(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let file=document.getElementById("imageInput").files[0];

if(!file)return alert("Choisir image");

let reader=new FileReader();
reader.onload=function(){
let products=JSON.parse(localStorage.getItem("products"));
products.push({name,price,image:reader.result});
localStorage.setItem("products",JSON.stringify(products));
// 3D animation tacos
let taco=document.getElementById("taco3d");
if(taco){
let angle=0;
setInterval(()=>{
angle+=2;
taco.style.transform=`rotateY(${angle}deg) rotateX(${Math.sin(angle/20)*10}deg)`;
},30);
}


displayProducts();
};
reader.readAsDataURL(file);
}

function deleteProduct(i){
let products=JSON.parse(localStorage.getItem("products"));
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
displayProducts();
}

function addToCart(name){
cart.push(name);
updateCart();
}

function updateCart(){
let list=document.getElementById("cartItems");
list.innerHTML="";
cart.forEach(item=>{
list.innerHTML+=`<p>• ${item}</p>`;
});
}

function openCart(){
document.getElementById("cart").style.display="block";
}

function closeCart(){
document.getElementById("cart").style.display="none";
}

function sendOrder(){
let msg="Bonjour je veux commander: " + cart.join(", ");
window.open("https://wa.me/212699007451?text="+encodeURIComponent(msg));
}

function secretClick(){
clicks++;
if(clicks==5){
document.getElementById("adminPanel").style.display="block";
clicks=0;
}
}

function closeAdmin(){
document.getElementById("adminPanel").style.display="none";
}


displayProducts();
</script></body>
</html>
