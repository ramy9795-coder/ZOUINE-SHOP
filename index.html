<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZOUINE CHOP</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:#eef3f9;
}

/* HEADER */
header{
    background:#0a3d62;
    color:white;
    text-align:center;
    padding:15px;
}

/* PRODUCTS */
#products{
    display:grid;
    grid-template-columns:1fr;
    gap:15px;
    padding:10px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    animation:fade 0.3s;
}

@keyframes fade{
    from{opacity:0; transform:scale(0.9);}
    to{opacity:1;}
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.info{
    padding:10px;
}

.price{
    color:#0a3d62;
    font-weight:bold;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#0a3d62;
    color:white;
}

/* CART */
#cart-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#0a3d62;
    padding:12px;
    border-radius:50%;
    color:white;
}

#cart{
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    display:none;
    padding:15px;
    border-radius:20px 20px 0 0;
}

/* CHAT BUTTON */
#chat-btn{
    position:fixed;
    bottom:20px;
    left:20px;
    background:#0a3d62;
    color:white;
    padding:12px;
    border-radius:50%;
}

/* CHAT */
#chat{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    max-width:400px;
    height:100%;
    background:#ece5dd;
    display:none;
    flex-direction:column;
}

#messages{
    flex:1;
    overflow:auto;
    padding:10px;
}

.msg{
    max-width:70%;
    padding:8px;
    margin:5px;
    border-radius:10px;
}

.client{
    background:#dcf8c6;
    margin-left:auto;
}

.bot{
    background:white;
}

/* INPUT */
#input{
    display:flex;
}

#input input{
    flex:1;
    padding:10px;
    border:none;
}

#input button{
    background:#0a3d62;
    color:white;
}

</style>
</head>

<body>

<header>ZOUINE CHOP</header>

<div id="products"></div>

<!-- CART -->
<button id="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></button>

<div id="cart">
<h3>السلة</h3>
<div id="cart-items"></div>
<h4>المجموع: <span id="total">0</span> درهم</h4>
</div>

<!-- CHAT -->
<div id="chat-btn" onclick="openChat()">💬</div>

<div id="chat">
<div id="messages"></div>

<div id="input">
<input id="msg" placeholder="كتب رسالة..." onkeypress="if(event.key==='Enter') sendMsg()">
<button onclick="sendMsg()">➤</button>
</div>
</div>

<script>

/* DATA */
let products = [
    {n:"منتج 1", i:"https://via.placeholder.com/400", p:50},
    {n:"منتج 2", i:"https://via.placeholder.com/400", p:80}
];

let cart = [];
let msgs = [];

/* PRODUCTS */
function renderProducts(){
    let div = document.getElementById('products');

    div.innerHTML = products.map((p,i)=>`
        <div class="card">
            <img src="${p.i}">
            <div class="info">
                <h3>${p.n}</h3>
                <div class="price">${p.p} درهم</div>
                <button onclick="addToCart(${i})">إضافة</button>
            </div>
        </div>
    `).join('');
}

/* CART */
function addToCart(i){
    cart.push(products[i]);
    document.getElementById('count').innerText = cart.length;
}

function toggleCart(){
    let c = document.getElementById('cart');
    c.style.display = c.style.display==="block"?"none":"block";
    renderCart();
}

function renderCart(){
    let div = document.getElementById('cart-items');
    let total = 0;

    div.innerHTML = cart.map(p=>{
        total += p.p;
        return `<div>${p.n} - ${p.p} درهم</div>`;
    }).join('');

    document.getElementById('total').innerText = total;
}

/* CHAT */
function openChat(){
    document.getElementById('chat').style.display="flex";
    renderMsgs();
}

function sendMsg(){
    let input = document.getElementById('msg');
    let text = input.value;

    if(!text) return;

    msgs.push({type:"client", text:text});
    input.value="";
    renderMsgs();

    setTimeout(()=>botReply(text),800);
}

/* BOT */
function botReply(text){

    let reply = "مرحبا 👋";

    if(text.includes("ثمن")){
        reply = "الأثمنة مكتوبة فالموقع 🛍️";
    }
    else if(text.includes("سلام")){
        reply = "وعليكم السلام 😊";
    }
    else{
        reply = "شكرا على الرسالة ديالك 👍";
    }

    msgs.push({type:"bot", text:reply});
    renderMsgs();
}

function renderMsgs(){
    let box = document.getElementById('messages');

    box.innerHTML = msgs.map(m=>`
        <div class="msg ${m.type}">${m.text}</div>
    `).join('');

    box.scrollTop = box.scrollHeight;
}

/* INIT */
renderProducts();

</script>

</body>
</html>
