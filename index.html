<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZOUINE Shop</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Cairo',sans-serif;
}

body{
  background: radial-gradient(circle at top, #1d1dff 0%, #09092d 40%, #030312 100%);
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:linear-gradient(120deg, transparent 20%, rgba(0,140,255,.15) 50%, transparent 80%);
  animation:shine 6s linear infinite;
  pointer-events:none;
}

@keyframes shine{
  from{transform:translateX(-100%)}
  to{transform:translateX(100%)}
}

.wrapper{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.logo{
  font-size:64px;
  font-weight:800;
  text-shadow:0 0 25px #00a2ff;
}

.shop{
  color:#00a2ff;
  font-style:italic;
}

.person{
  width:220px;
  border-radius:20px;
  box-shadow:0 0 30px rgba(0,140,255,.5);
}

.title{
  text-align:center;
  font-size:42px;
  font-weight:800;
  margin:20px 0 40px;
  text-shadow:0 0 15px #008cff;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(0,140,255,.45);
  border-radius:24px;
  padding:20px;
  box-shadow:0 0 25px rgba(0,140,255,.25);
  backdrop-filter:blur(8px);
}

.image-box{
  height:220px;
  border:2px dashed rgba(255,255,255,.3);
  border-radius:18px;
  position:relative;
  overflow:hidden;
  margin-bottom:16px;
  background:rgba(0,0,0,.2);
}

.image-box img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}

.upload-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#005dff,#00a2ff);
  color:#fff;
  font-size:18px;
  cursor:pointer;
  margin-top:10px;
}

.card h3{
  font-size:28px;
  margin-bottom:8px;
}

.card p{
  opacity:.85;
}

.footer-icons{
  margin-top:60px;
  display:flex;
  justify-content:center;
  gap:20px;
}

.icon{
  width:60px;
  height:60px;
  border-radius:16px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  border:1px solid rgba(0,140,255,.4);
  box-shadow:0 0 15px rgba(0,140,255,.25);
}
</style>
</head>
<body>

<div class="wrapper">

  <div class="header">
    <div>
      <div class="logo">ZOUINE <span class="shop">Shop</span></div>
      <div class="title">أفضل حسابات Free Fire في العالم</div>
    </div>

    <img class="person" src="https://via.placeholder.com/220x320" alt="person">
  </div>

  <div class="cards">

    <div class="card">
      <div class="image-box">
        <img id="img1">
      </div>
      <input type="file" id="file1" hidden accept="image/*">
      <button class="upload-btn" onclick="pickImage(1)">إضافة صورة الحساب</button>
      <h3>اسم الحساب</h3>
      <p>المستوى | التفاصيل</p>
    </div>

    <div class="card">
      <div class="image-box">
        <img id="img2">
      </div>
      <input type="file" id="file2" hidden accept="image/*">
      <button class="upload-btn" onclick="pickImage(2)">إضافة صورة الحساب</button>
      <h3>اسم الحساب</h3>
      <p>المستوى | التفاصيل</p>
    </div>

    <div class="card">
      <div class="image-box">
        <img id="img3">
      </div>
      <input type="file" id="file3" hidden accept="image/*">
      <button class="upload-btn" onclick="pickImage(3)">إضافة صورة الحساب</button>
      <h3>اسم الحساب</h3>
      <p>المستوى | التفاصيل</p>
    </div>

  </div>

  <div class="footer-icons">
    <div class="icon">🎵</div>
    <div class="icon">▶</div>
    <div class="icon">📷</div>
    <div class="icon">f</div>
  </div>

</div>

<script>
function pickImage(id){
  document.getElementById('file'+id).click();
}

for(let i=1;i<=3;i++){
  const file=document.getElementById('file'+i);
  const img=document.getElementById('img'+i);

  const saved=localStorage.getItem('cardImg'+i);
  if(saved){
    img.src=saved;
    img.style.display='block';
  }

  file.addEventListener('change',function(){
    const reader=new FileReader();
    reader.onload=function(e){
      img.src=e.target.result;
      img.style.display='block';
      localStorage.setItem('cardImg'+i,e.target.result);
    }
    reader.readAsDataURL(this.files[0]);
  });
}
</script>

</body>
</html>
