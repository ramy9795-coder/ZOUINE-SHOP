<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KHORDA GAMES</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
}

header{
  background:#00c853;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#111a2e;
  padding:10px;
  border-radius:10px;
}

img{
  width:100%;
  height:140px;
  object-fit:cover;
}
</style>
</head>

<body>

<header>KHORDA GAMES 🎮</header>

<div class="grid">

  <div class="card">
    <img src="https://via.placeholder.com/300">
    <h3>Game 1</h3>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300">
    <h3>Game 2</h3>
  </div>

</div>

</body>
</html>
