<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOUINE CHOP</title><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet"><style>

:root{
--main:#0a2fff;
--dark:#061a5e;
--card:#0c1f6d;
}

body{
margin:0;
font-family:'Tajawal',sans-serif;
background:linear-gradient(180deg,#061a5e,#020a30);
color:white;
}

header{
font-family:'Cairo';
font-size:34px;
text-align:center;
padding:25px;
background:var(--main);
box-shadow:0 5px 20px rgba(0,0,0,.5);
letter-spacing:2px;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
background:var(--card);
padding:25px;
border-radius:25px;
margin-top:25px;
box-shadow:0 10px 30px rgba(0,0,0,.6);
}

h2{
font-family:'Cairo';
text-align:center;
margin-bottom:20px;
}

.product{
background:#030d40;
padding:15px;
margin-top:15px;
border-radius:18px;
box-shadow:0 6px 18px rgba(0,0,0,.5);
}

.product-title{
font-size:18px;
margin-bottom:8px;
}

.price{
color:#7fa8ff;
margin-bottom:10px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#020a30;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#2c6bff,#0a2fff);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

</style></head><body><header>ZOUINE CHOP</header><div class="container"><div class="card"><h2>🔥 حسابات Free Fire</h2><input id="username" placeholder="اكتب اسمك لإرسال الطلب"><div class="product">
<div class="product-title">حساب أسطوري</div>
<div class="price">150 MAD</div>
<button onclick="order('حساب أسطوري')">طلب الحساب</button>
</div><div class="product">
<div class="product-title">حساب نادر</div>
<div class="price">90 MAD</div>
<button onclick="order('حساب نادر')">طلب الحساب</button>
</div><div class="product">
<div class="product-title">حساب مبتدئ</div>
<div class="price">40 MAD</div>
<button onclick="order('حساب مبتدئ')">طلب الحساب</button>
</div></div></div><script>

function order(product){

let user=document.getElementById("username").value

if(user==""){
alert("دخل اسمك باش نصيفط الطلب")
return
}

let message="طلب جديد من ZOUINE CHOP:%0Aاسم المستخدم: "+user+"%0Aالمنتج: "+product

window.location.href="https://wa.me/212644404084?text="+message

}

</script></body>
</html>
